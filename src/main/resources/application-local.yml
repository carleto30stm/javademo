cors:
  allowed-origins: "http://localhost:8080,http://localhost:4200"

jwt:
  secret: bG9jYWxkZXYtc2VjcmV0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmctZm9yLUhTMjU2
  expiration-ms: 86400000
  cookie:
    secure: false

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gestion_productos_servicios?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  cache:
    type: redis
    redis:
      time-to-live: 600000
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    connection-timeout: 5000
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 10000
          max-retries: 5
          multiplier: 2.0
          max-interval: 60000
        recovery-interval: 30000

exchange-rate:
  api:
    base-url: https://open.er-api.com/v6/latest
    base-currency: USD
  schedule:
    cron: "0 */30 * * * *"
  alert:
    threshold-pct: 2.0
  cache:
    ttl-minutes: 60
  supported-currencies: EUR,MXN,GBP,COP
