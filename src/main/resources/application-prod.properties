# Spring Boot Configuration for Railway Production
# Se activa con SPRING_PROFILES_ACTIVE=prod

# CORS - IMPORTANTE: NO usar * con allowCredentials=true
# Especificar origins concretos del frontend en producción
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000
jwt.cookie.secure=true

# Server - SIN context-path, los controllers ya tienen /api/v1/...
server.port=${PORT:8080}
server.forward-headers-strategy=FRAMEWORK
server.compression.enabled=true
server.compression.min-response-size=1024

# Logging
logging.level.root=INFO
logging.level.com.productos=INFO

# Springdoc / Swagger - IGUAL que en local
springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/api/v1/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.use-root-path=false
springdoc.swagger-ui.display-operation-id=true
springdoc.swagger-ui.deep-linking=true

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pooling (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Redis - Usar URL completa
spring.data.redis.url=${REDIS_URL}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:5000}
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# RabbitMQ - Tolerante a fallos en producción
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${SPRING_RABBITMQ_VIRTUAL_HOST:/}
spring.rabbitmq.connection-timeout=5000
spring.rabbitmq.timeout=5000
