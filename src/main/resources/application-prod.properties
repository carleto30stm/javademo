# Spring Boot Configuration for Railway Production
# Se activa con SPRING_PROFILES_ACTIVE=prod

# CORS - IMPORTANTE: NO usar * con allowCredentials=true
# Especificar origins concretos del frontend en producción
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000
jwt.cookie.secure=true
# SameSite=None es obligatorio para cookies cross-domain (frontend y backend en dominios distintos)
jwt.cookie.same-site=None

# Server - SIN context-path, los controllers ya tienen /api/v1/...
server.port=${PORT:8080}
server.forward-headers-strategy=FRAMEWORK
server.compression.enabled=true
server.compression.min-response-size=1024

# Logging
logging.level.root=INFO
logging.level.com.productos=INFO

# Springdoc / Swagger - IGUAL que en local
springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/api/v1/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.use-root-path=false
springdoc.swagger-ui.display-operation-id=true
springdoc.swagger-ui.deep-linking=true

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pooling (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Redis - Usar URL completa
spring.data.redis.url=${REDIS_URL}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:5000}
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# RabbitMQ - Tolerante a fallos en producción
# Spring Boot parsea automáticamente amqp://user:pass@host:port
spring.rabbitmq.url=${SPRING_RABBITMQ_URL}
spring.rabbitmq.connection-timeout=5000
spring.rabbitmq.timeout=5000

# RabbitMQ Listener - Reintentos exponenciales (production-grade)
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=15000
spring.rabbitmq.listener.simple.retry.max-retries=5
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=120000
spring.rabbitmq.listener.simple.recovery-interval=30000
spring.rabbitmq.listener.simple.prefetch=1
spring.rabbitmq.listener.simple.concurrency=1
spring.rabbitmq.listener.simple.max-concurrency=5

# Exchange Rate Configuration
exchange-rate.api.base-url=${EXCHANGE_RATE_API_BASE_URL:https://open.er-api.com/v6/latest}
exchange-rate.api.base-currency=${EXCHANGE_RATE_BASE_CURRENCY:USD}
exchange-rate.schedule.cron=${EXCHANGE_RATE_SCHEDULE_CRON:0 0 */6 * * *}
exchange-rate.alert.threshold-pct=${EXCHANGE_RATE_ALERT_THRESHOLD:2.0}
exchange-rate.cache.ttl-minutes=${EXCHANGE_RATE_CACHE_TTL:120}
exchange-rate.supported-currencies=${EXCHANGE_RATE_SUPPORTED_CURRENCIES:EUR,MXN,GBP,COP}
