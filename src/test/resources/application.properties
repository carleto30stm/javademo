spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

logging.level.org.springframework=WARN

# JWT Configuration for Tests
jwt.secret=dGVzdC1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHMtbG9uZy1mb3ItSFMyNTY=
jwt.expiration-ms=86400000
jwt.cookie.secure=false

# Redis (disabled for tests or in-memory)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# RabbitMQ (valores para test - Spring AMQP test starter los maneja)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Evita que los @RabbitListener intenten conectar al broker durante tests
spring.amqp.deserialization.trust.all=true
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false

# Exchange Rate API - propiedades requeridas por WebClientConfig
exchange-rate.api.base-url=https://open.er-api.com/v6/latest
exchange-rate.api.base-currency=USD
exchange-rate.schedule.cron=0 */30 * * * *
exchange-rate.alert.threshold-pct=2.0
exchange-rate.cache.ttl-minutes=60
exchange-rate.supported-currencies=EUR,MXN,GBP,COP

# Deshabilitar scheduling en tests para evitar llamadas a APIs externas
spring.task.scheduling.enabled=false

